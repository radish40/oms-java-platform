spring:
  application:
    name: oms-platform

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:oms_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${DB_USER:oms_user}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:1}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  threads:
    virtual:
      enabled: true

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.oms.platform.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  port: ${PORT:18020}
  undertow:
    threads:
      io: 4
      worker: 20

logging:
  level:
    root: INFO
    com.example.oms.platform: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

oms:
  security:
    auth-secret: ${PLATFORM_AUTH_SECRET:}
    default-user: ${PLATFORM_DEFAULT_USER:admin}
    default-password: ${PLATFORM_DEFAULT_PASSWORD:}
    default-display: ${PLATFORM_DEFAULT_DISPLAY:Platform Admin}
    support-user: ${PLATFORM_SUPPORT_USER:support}
    support-password: ${PLATFORM_SUPPORT_PASSWORD:}
    support-display: ${PLATFORM_SUPPORT_DISPLAY:Platform Support}
  python-runtime:
    base-url: ${MODEL_RUNTIME_URL:${PYTHON_RUNTIME_URL:http://localhost:18010}}
    timeout: 30000

knife4j:
  enable: true
  setting:
    language: zh_cn
